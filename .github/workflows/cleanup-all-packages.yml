name: cleanup all packages

on:
  workflow_dispatch: {}

jobs:
  delete-old-versions:
    runs-on: ubuntu-22.04
    permissions:
      packages: write

    steps:
      - name: Prune all images (except latest)
        uses: snok/container-retention-policy@v3.0.0
        with:
          image-names: |
            aircraft-image
            ground-image
            simulation-image
          cut-off: 1s
          image-tags: "!latest"
          keep-n-most-recent: 1
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
