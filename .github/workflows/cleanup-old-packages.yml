name: cleanup old packages

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch: {}

jobs:
  delete-old-versions:
    runs-on: ubuntu-22.04
    permissions:
      packages: write

    steps:
      - name: Prune images older than 7 days 1h before the next weekly build
        uses: snok/container-retention-policy@v3.0.0
        with:
          image-names: |
            aircraft-image
            ground-image
            simulation-image
          cut-off: 7d
          keep-n-most-recent: 0
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
